version: '3.8'

services:
  # 1. PostgreSQL - Database for NestJS
  postgres:
    image: postgres:15-alpine
    container_name: factory_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aifactory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis - Cache and BullMQ backend
  redis:
    image: redis:7-alpine
    container_name: factory_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 3. Qdrant - Vector Database for RAG / Agent memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: factory_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 4. Ollama - Local LLM Inference Engine (Free alternative to OpenAI)
  ollama:
    image: ollama/ollama:latest
    container_name: factory_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # UNCOMMENT the below section if you have an NVIDIA GPU and installed nvidia-container-toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
